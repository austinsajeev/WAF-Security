# RESPONSE-999-AEGIS-SCORE.conf
# Using setheader in phase 4.

SecRule TX:inbound_anomaly_score "@gt 0" \
  "id:100001,phase:4,pass,nolog,setheader:X-Waf-Score=%{tx.inbound_anomaly_score}"

SecRule TX:inbound_anomaly_score "@gt 0" \
  "id:100002,phase:4,pass,nolog,setheader:X-Waf-Inbound=%{tx.inbound_anomaly_score}"
