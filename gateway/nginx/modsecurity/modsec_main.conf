# =============================================================================
# AegisAI-X — ModSecurity Main Configuration
# Fail-OPEN mode: traffic passes if ModSecurity has an internal error
# =============================================================================

# Core toggle — DetectionOnly = monitor + log, never block
# Switch to 'On' only after tuning phase (Phase 3)
SecRuleEngine On

# Request body inspection
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction ProcessPartial

# Response body inspection (enable selectively — adds latency)
SecResponseBodyAccess Off

# File uploads
SecUploadDir /tmp/modsec_uploads
SecUploadKeepFiles Off

# Logging
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogType Serial
SecAuditLog /var/log/modsec/audit.log
SecAuditLogParts ABIJDEFHZ

SecDebugLog /var/log/modsec/debug.log
SecDebugLogLevel 0           # Set to 3 for troubleshooting, 0 for production

# Temp files location
SecTmpDir /tmp/modsec_tmp
SecDataDir /tmp/modsec_data

# =============================================================================
# OWASP Core Rule Set (CRS) Tuning
# =============================================================================

# CRS Anomaly Scoring Thresholds
# Lower = stricter. Start HIGH to avoid false positives, tune down over time.
SecAction \
    "id:900000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.paranoia_level=1"

# Inbound anomaly threshold (block if score exceeds) — 100 = very lenient
# Default CRS is 5. We start at 25 to reduce false positives in Phase 1.
SecAction \
    "id:900110,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.inbound_anomaly_score_threshold=25,\
    setvar:tx.outbound_anomaly_score_threshold=4"

# =============================================================================
# Include OWASP CRS Rules
# Install CRS: apt install modsecurity-crs
# =============================================================================
Include /etc/modsecurity/crs/crs-setup.conf
Include /etc/modsecurity/crs/rules/*.conf

# =============================================================================
# AegisAI-X Custom Rules
# =============================================================================

# Rule 1: Detect common SQL injection via GET params
SecRule ARGS "@detectSQLi" \
    "id:100001,\
    phase:2,\
    log,\
    pass,\
    msg:'AegisAI: SQL Injection Attempt Detected',\
    logdata:'Matched Data: %{TX.0} in %{MATCHED_VAR_NAME}: %{MATCHED_VAR}',\
    tag:'aegisai/sqli',\
    severity:'CRITICAL',\
    setvar:tx.anomaly_score_pl1=+%{tx.critical_anomaly_score}"

# Rule 2: Detect XSS in request args
SecRule ARGS "@detectXSS" \
    "id:100002,\
    phase:2,\
    log,\
    pass,\
    msg:'AegisAI: XSS Attempt Detected',\
    tag:'aegisai/xss',\
    severity:'CRITICAL',\
    setvar:tx.anomaly_score_pl1=+%{tx.critical_anomaly_score}"

# Rule 3: Block path traversal attempts
SecRule REQUEST_URI "@contains ../" \
    "id:100003,\
    phase:1,\
    log,\
    pass,\
    msg:'AegisAI: Path Traversal Attempt',\
    tag:'aegisai/traversal',\
    severity:'ERROR'"

# Rule 4: Detect scanner User-Agents (extra layer beyond nginx)
SecRule REQUEST_HEADERS:User-Agent "@pmFromFile /etc/nginx/modsecurity/scanner_ua.txt" \
    "id:100004,\
    phase:1,\
    log,\
    pass,\
    msg:'AegisAI: Known Scanner UA Detected',\
    tag:'aegisai/scanner',\
    severity:'WARNING'"

# Rule 5: Log anomaly score into Nginx variable (for JSON log output)
SecAction \
    "id:100099,\
    phase:5,\
    nolog,\
    pass,\
    setenv:MODSEC_ANOMALY=%{tx.anomaly_score}"
