# =============================================================================
# AegisAI-X — Per-Site Virtual Host Template
# Copy this file for each protected website.
# Replace all {{ PLACEHOLDERS }} with actual values.
# =============================================================================
# Variables to replace:
#   {{ SITE_ID }}        — Unique site identifier, e.g. "site_042"
#   {{ DOMAIN }}         — Public domain, e.g. "example.com"
#   {{ UPSTREAM_HOST }}  — Internal app host, e.g. "127.0.0.1"
#   {{ UPSTREAM_PORT }}  — Internal app port, e.g. "8080"
#   {{ SSL_CERT }}       — Path to TLS certificate
#   {{ SSL_KEY }}        — Path to TLS private key
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name {{ DOMAIN }} www.{{ DOMAIN }};

    # ACME challenge passthrough (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Primary HTTPS Server
server {
    listen 443 ssl http2;
    server_name {{ DOMAIN }} www.{{ DOMAIN }};

    # ------------------------------------------------------------------
    # TLS Configuration
    # ------------------------------------------------------------------
    ssl_certificate     {{ SSL_CERT }};
    ssl_certificate_key {{ SSL_KEY }};
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    # Modern TLS only (disable TLS 1.0, 1.1)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # HSTS (tell browsers to always use HTTPS for 1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ------------------------------------------------------------------
    # Security Headers
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin"    always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; object-src 'none';" always;

    # ------------------------------------------------------------------
    # Site-specific ModSecurity variable (injected into logs)
    # ------------------------------------------------------------------
    set $SITE_ID "{{ SITE_ID }}";

    # ------------------------------------------------------------------
    # Connection Limits (anti-DDoS per site)
    # ------------------------------------------------------------------
    limit_conn conn_limit 50;

    # ------------------------------------------------------------------
    # Whitelist: Legitimate Crawlers & Internal Services (MUST come first)
    # Prevents SEO damage and false-positives on monitoring tools
    # ------------------------------------------------------------------
    # Map returns 1 for known-good bots, 0 for everything else
    map $http_user_agent $is_allowed_bot {
        default                         0;
        ~*Googlebot                     1;   # Google Search
        ~*Bingbot                       1;   # Bing Search
        ~*Slurp                         1;   # Yahoo
        ~*DuckDuckBot                   1;   # DuckDuckGo
        ~*facebookexternalhit           1;   # Facebook link preview
        ~*Twitterbot                    1;   # Twitter link preview
        ~*LinkedInBot                   1;   # LinkedIn
        ~*UptimeRobot                   1;   # Uptime monitoring
        ~*StatusCake                    1;   # Uptime monitoring
        ~*AegisAI-HealthCheck           1;   # Our own internal health prober
        ~*Prometheus-Blackbox-Exporter  1;   # Prometheus probing
    }

    # ------------------------------------------------------------------
    # Block Suspicious User-Agents (only if NOT a whitelisted bot)
    # ------------------------------------------------------------------
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zgrab|dirbuster|gobuster|wfuzz|hydra)) {
        return 403;
    }

    # Block empty user agents (bot indicator)
    if ($http_user_agent = "") {
        return 403;
    }

    # ------------------------------------------------------------------
    # Block Suspicious Request Methods
    # ------------------------------------------------------------------
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|PATCH|OPTIONS)$) {
        return 405;
    }

    # ------------------------------------------------------------------
    # Default Location — Apply Global Rate Limit
    # ------------------------------------------------------------------
    location / {
        # Rate limiting: burst allows short spikes, nodelay = immediate reject over burst
        limit_req zone=global_rate burst=200 nodelay;
        limit_req_status 429;

        proxy_pass http://{{ UPSTREAM_HOST }}:{{ UPSTREAM_PORT }};
        include /etc/nginx/proxy_params;
    }

    # ------------------------------------------------------------------
    # Login / Auth Endpoints — Strict Rate Limiting
    # ------------------------------------------------------------------
    location ~* ^/(login|signin|auth|admin/login|wp-login\.php|api/v[0-9]+/auth) {
        limit_req zone=login_rate burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://{{ UPSTREAM_HOST }}:{{ UPSTREAM_PORT }};
        include /etc/nginx/proxy_params;
    }

    # ------------------------------------------------------------------
    # API Endpoints
    # ------------------------------------------------------------------
    location ~* ^/api/ {
        limit_req zone=api_rate burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://{{ UPSTREAM_HOST }}:{{ UPSTREAM_PORT }};
        include /etc/nginx/proxy_params;
    }

    # ------------------------------------------------------------------
    # Block common attack paths outright (no WAF needed, fast drop)
    # ------------------------------------------------------------------
    location ~* \.(env|git|svn|htaccess|htpasswd|bak|sql|sh|py|rb|pl|php~|phtml)$ {
        return 404;
    }

    location ~* /(wp-admin|phpmyadmin|adminer|phpMyAdmin|pma|phpinfo) {
        # Log and drop — commonly probed by bots
        access_log /var/log/nginx/aegisai_access.log aegisai_json;
        return 403;
    }

    # ------------------------------------------------------------------
    # Custom Error Pages
    # ------------------------------------------------------------------
    error_page 429 /rate_limited.html;
    error_page 403 /forbidden.html;
    error_page 502 503 504 /maintenance.html;
}
