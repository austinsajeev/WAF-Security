# Map WAF score header to a variable with a default of 0
map $sent_http_x_waf_score $waf_score_val {
    default  $sent_http_x_waf_score;
    ""       0;
}

log_format aegisai_json escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"site_id":"gateway_default",'
        '"remote_addr":"$http_x_forwarded_for",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status_code":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher",'
        '"request_id":"$request_id",'
        '"waf_score":$waf_score_val,'
        '"waf_inbound":0,'
        '"is_trusted":true'
    '}';

access_log /var/log/nginx/aegisai_access.log aegisai_json;
