# =============================================================================
# AegisAI-X — Production Nginx Configuration
# Component: Gateway Node (deployed on every protected server)
# Version: 1.0.0
# =============================================================================
# Design Decisions:
#   - Fail-OPEN: If ModSecurity crashes, traffic still passes (business safety)
#   - mTLS enforced on internal admin/API paths
#   - Rate limiting per IP using shared memory zones
#   - All logs written in structured JSON for Filebeat pickup
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    # -------------------------------------------------------------------------
    # MIME & Basic Settings
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide server version from attackers
    server_tokens off;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # -------------------------------------------------------------------------
    # Buffer Sizes (prevent buffer overflow attacks)
    # -------------------------------------------------------------------------
    client_body_buffer_size     16k;
    client_header_buffer_size   1k;
    client_max_body_size        10m;
    large_client_header_buffers 4 8k;

    # -------------------------------------------------------------------------
    # Timeouts (prevent slowloris & slow-read attacks)
    # -------------------------------------------------------------------------
    client_body_timeout    12s;
    client_header_timeout  12s;
    send_timeout           10s;

    # -------------------------------------------------------------------------
    # Rate Limiting Zones (shared memory)
    # -------------------------------------------------------------------------
    # Extract real client IP from X-Forwarded-For for rate limiting
    map $http_x_forwarded_for $real_client_ip {
        default          $http_x_forwarded_for;
        ""               $remote_addr;         # fallback if header absent
    }

    # Map WAF score header to a variable with a default of 0
    map $sent_http_x_waf_score $waf_score_val {
        default  $sent_http_x_waf_score;
        ""       0;
    }

    # Global per-IP rate limit (primary defense)
    limit_req_zone $real_client_ip zone=global_rate:20m rate=100r/s;

    # Stricter zone for auth/login endpoints
    limit_req_zone $real_client_ip zone=login_rate:10m  rate=5r/m;

    # API endpoint zone
    limit_req_zone $real_client_ip zone=api_rate:10m    rate=30r/s;

    # Connection limit per IP (anti-DDoS)
    limit_conn_zone $real_client_ip zone=conn_limit:10m;

    # -------------------------------------------------------------------------
    # Log format is defined in conf.d/aegisai_logging.conf
    # -------------------------------------------------------------------------
    # DO NOT define aegisai_json here — conf.d owns the log_format definition.
    # Defining it in both places causes "duplicate log_format" startup error.

    # -------------------------------------------------------------------------
    # Include conf.d (picks up aegisai_logging.conf, etc.)
    # -------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;

    # -------------------------------------------------------------------------
    # GZip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript;

    # -------------------------------------------------------------------------
    # ModSecurity WAF (Fail-Open Mode)
    # -------------------------------------------------------------------------
    # CRITICAL: SecRuleEngine DetectionOnly = fail-open
    # Traffic passes even if modsec internal error occurs.
    # Change to 'On' only after tuning phase is complete (Phase 3).
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsecurity/modsec_main.conf;

    # -------------------------------------------------------------------------
    # Include Virtual Hosts
    # -------------------------------------------------------------------------
    include /etc/nginx/sites-enabled/*.conf;
}
