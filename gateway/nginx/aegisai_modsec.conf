# AegisAI-X — ModSecurity score passthrough
# Uses the OWASP CRS anomaly scoring output to expose the inbound score
# as a response header, enabling the Nginx log format to capture it.
# 
# NOTE: ModSecurity3 / libmodsecurity action for setting response headers
# is `setoutboundheader` but it must be in the correct format.
# CRS4 uses phase:3 for response header injection.
#
modsecurity_rules '
  SecRule TX:inbound_anomaly_score "@gt 0" "id:1000001,phase:3,pass,nolog,setenv:WAF_SCORE=%{tx.inbound_anomaly_score}"
';
