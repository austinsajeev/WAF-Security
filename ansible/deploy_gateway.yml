---
# =============================================================================
# AegisAI-X — Ansible Deployment Playbook
# Canary → Full Rollout Pattern with Auto-Rollback
# Version: 1.0.0
# =============================================================================
# Usage:
#   ansible-playbook -i inventories/production.ini deploy_gateway.yml
#
# Rollback:
#   ansible-playbook -i inventories/production.ini deploy_gateway.yml \
#     -e "rollback=true" -e "rollback_version=1.2.3"
#
# Required Vars (set in group_vars/all.yml or passed via -e):
#   aegisai_version     — release tag, e.g. "1.3.0"
#   site_configs_repo   — git URL of site configs
#   crs_version         — OWASP CRS version to install
# =============================================================================

- name: "AegisAI-X | Phase 0: Pre-flight Checks"
  hosts: all
  gather_facts: true
  tasks:

    - name: Verify Ansible connectivity to all hosts
      ping:

    - name: Check OS compatibility (Ubuntu 20.04+)
      assert:
        that:
          - ansible_distribution == 'Ubuntu'
          - ansible_distribution_major_version | int >= 20
        fail_msg: "AegisAI-X requires Ubuntu 20.04+. Found: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Check disk space (require > 20GB free on /)
      assert:
        that: ansible_mounts | selectattr('mount', 'eq', '/') | map(attribute='size_available') | first > 21474836480
        fail_msg: "Insufficient disk space on {{ inventory_hostname }}"

# =============================================================================
- name: "AegisAI-X | Phase 1: CANARY DEPLOYMENT (10 servers)"
  hosts: canary_group          # defined in inventory — 10 representative servers
  serial: 1                    # roll one server at a time in canary group
  max_fail_percentage: 0       # abort entire play if ANY canary server fails
  vars:
    deploy_phase: "canary"

  pre_tasks:
    - name: "[CANARY] Snapshot current Nginx config version"
      shell: nginx -v 2>&1 && md5sum /etc/nginx/nginx.conf | awk '{print $1}'
      register: pre_deploy_state
      changed_when: false

    - name: "[CANARY] Record pre-deploy WAF block rate (baseline)"
      uri:
        url: "http://localhost:5066/stats"
        return_content: true
      register: pre_deploy_metrics
      ignore_errors: true     # metrics may not exist on first deploy

  roles:
    - role: aegisai_nginx_gateway
    - role: aegisai_modsecurity
    - role: aegisai_filebeat

  post_tasks:
    - name: "[CANARY] Wait 60 seconds for metrics to stabilize"
      pause:
        seconds: 60

    - name: "[CANARY] Check Nginx is serving traffic (HTTP 200 on health endpoint)"
      uri:
        url: "http://localhost/health"
        status_code: 200
      retries: 5
      delay: 10

    - name: "[CANARY] Verify WAF is active (ModSecurity loaded)"
      command: nginx -T
      register: nginx_config_test
      changed_when: false
      failed_when: "'ModSecurity loaded' not in nginx_config_test.stdout"

    - name: "[CANARY] Verify Filebeat is shipping logs"
      command: systemctl is-active filebeat
      changed_when: false
      failed_when: "'active' not in filebeat_status.stdout"
      register: filebeat_status

    - name: "[CANARY] Pause for human review — check Grafana dashboard"
      pause:
        prompt: |
          ===================================================
          CANARY COMPLETE on {{ inventory_hostname }}
          Check Grafana → AegisAI-X Node Health dashboard
          Press ENTER to continue rollout, Ctrl+C to abort
          ===================================================
        minutes: 5           # auto-continue after 5 min if no input
      when: not auto_rollout | default(false)


# =============================================================================
- name: "AegisAI-X | Phase 2: FULL ROLLOUT (all remaining servers)"
  hosts: production_servers    # all non-canary servers
  serial: "10%"                # deploy to 10% of servers at a time
  max_fail_percentage: 5       # tolerate up to 5% failure rate before aborting
  vars:
    deploy_phase: "full"

  pre_tasks:
    - name: "[FULL] Validate monitoring is healthy before this batch"
      uri:
        url: "http://{{ central_server }}:9090/api/v1/query?query=up"
        return_content: true
      register: prometheus_health
      failed_when: "'success' not in prometheus_health.content"

  roles:
    - role: aegisai_nginx_gateway
    - role: aegisai_modsecurity
    - role: aegisai_filebeat

  post_tasks:
    - name: "[FULL] Verify Nginx is healthy after deployment"
      uri:
        url: "http://localhost/health"
        status_code: 200
      retries: 3
      delay: 5

    - name: "[FULL] Log deployment record"
      local_action:
        module: lineinfile
        path: "{{ playbook_dir }}/deployment.log"
        line: "{{ ansible_date_time.iso8601 }} | {{ inventory_hostname }} | {{ aegisai_version }} | SUCCESS"
        create: true


# =============================================================================
- name: "AegisAI-X | ROLLBACK (run with -e rollback=true)"
  hosts: all
  gather_facts: false
  serial: "20%"
  when: rollback | default(false)

  tasks:
    - name: "[ROLLBACK] Restore previous Nginx config from Git"
      git:
        repo: "{{ site_configs_repo }}"
        dest: /etc/nginx
        version: "{{ rollback_version }}"
        force: true

    - name: "[ROLLBACK] Restore previous ModSecurity config"
      git:
        repo: "{{ site_configs_repo }}"
        dest: /etc/modsecurity
        version: "{{ rollback_version }}"
        force: true

    - name: "[ROLLBACK] Validate restored Nginx config"
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: "[ROLLBACK] Reload Nginx if config is valid"
      service:
        name: nginx
        state: reloaded
      when: nginx_test.rc == 0

    - name: "[ROLLBACK] Abort if config invalid (do NOT reload broken config)"
      fail:
        msg: "Rollback config is INVALID — manual intervention required on {{ inventory_hostname }}"
      when: nginx_test.rc != 0

    - name: "[ROLLBACK] Log rollback record"
      local_action:
        module: lineinfile
        path: "{{ playbook_dir }}/deployment.log"
        line: "{{ ansible_date_time.iso8601 }} | {{ inventory_hostname }} | {{ rollback_version }} | ROLLBACK"
        create: true
